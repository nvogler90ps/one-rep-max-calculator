<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{from_value}} {{from_label}} to {{to_label}} - Unit Converter</title>
<meta name="description" content="Convert {{from_value}} {{from_label}} to {{to_label}}. {{from_value}} {{from_label}} = {{to_value}} {{to_label}}. Free instant conversion with formula.">
<link rel="canonical" href="https://automated-insights.com/unit-converter/{{slug}}/">
<meta property="og:title" content="{{from_value}} {{from_label}} to {{to_label}}">
<meta property="og:description" content="{{from_value}} {{from_label}} = {{to_value}} {{to_label}}. Free instant unit conversion calculator.">
<meta property="og:url" content="https://automated-insights.com/unit-converter/{{slug}}/">
<meta property="og:type" content="website">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3434609691579834" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2e3345;--text:#e8eaed;--text-muted:#9aa0b0;--accent:#6c63ff;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px}
h1{font-size:1.4rem;text-align:center;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;text-align:center}
.result{font-size:2rem;font-weight:700;color:var(--accent);margin:12px 0}
.formula{color:var(--text-muted);font-size:0.9rem;margin-top:8px}
.formula code{color:var(--accent);font-family:monospace}
.related{margin-top:24px}
.related h2{font-size:1rem;margin-bottom:12px;color:var(--text-muted)}
.related ul{list-style:none;display:flex;flex-wrap:wrap;gap:8px}
.related a{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 14px;color:var(--text);text-decoration:none;font-size:0.85rem;transition:border-color 0.2s}
.related a:hover{border-color:var(--accent)}
.back{display:inline-block;margin-top:20px;color:var(--accent);text-decoration:none;font-size:0.9rem}
footer{text-align:center;color:var(--text-muted);font-size:0.8rem;padding:24px 0 16px;border-top:1px solid var(--border);margin-top:32px}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){h1{font-size:1.1rem}.result{font-size:1.5rem}}
</style>
</head>
<body>
<div class="container">
<h1>Convert {{from_value}} {{from_label}} to {{to_label}}</h1>
<div class="card">
  <div class="subtitle">{{from_value}} {{from_label}} equals</div>
  <div class="result">{{to_value}} {{to_label}}</div>
  <div class="formula">Formula: <code>{{formula}}</code></div>
</div>
<a href="/unit-converter/" class="back">&larr; Back to Unit Converter</a>
<footer>
  <a href="https://automated-insights.com/">Automated Insights</a> &middot; Free tools for everyday calculations
</footer>
</div>
</body>
</html>
