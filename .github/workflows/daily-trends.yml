name: Daily Trend Scanner

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scan-trends:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run trend scanner (no LLM -- classification done locally via Claude CLI)
        run: python scripts/trend_scanner.py --no-llm

      - name: Commit and push results
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@automated-insights.dev"
          git add trends/
          git diff --cached --quiet || git commit -m "Daily trend scan: $(date +%Y-%m-%d)"
          git push
