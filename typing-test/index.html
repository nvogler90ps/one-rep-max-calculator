<body>

<div class="container">
  <h1>Typing Test</h1>
  <p class="subtitle">Test your typing speed and accuracy</p>

  <div class="timer-bar" id="timerBar">
    <button class="timer-btn" data-time="15">15s</button>
    <button class="timer-btn active" data-time="30">30s</button>
    <button class="timer-btn" data-time="60">60s</button>
    <button class="timer-btn" data-time="120">120s</button>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <div class="stat-value" id="liveWpm">0</div>
      <div class="stat-label">WPM</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="liveTime">30</div>
      <div class="stat-label">Seconds</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="liveAccuracy">100</div>
      <div class="stat-label">Accuracy %</div>
    </div>
  </div>

  <div class="word-display" id="wordDisplay">
    <div class="prompt-overlay" id="promptOverlay">
      <span class="prompt-text">Click here or start typing...</span>
    </div>
  </div>

  <input type="text" class="hidden-input" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

  <div class="results" id="results">
    <h2>Results</h2>
    <div class="results-grid">
      <div class="result-card">
        <div class="value" id="resWpm">0</div>
        <div class="label">Net WPM</div>
      </div>
      <div class="result-card">
        <div class="value accent-green" id="resAccuracy">0%</div>
        <div class="label">Accuracy</div>
      </div>
      <div class="result-card">
        <div class="value" id="resGrossWpm">0</div>
        <div class="label">Gross WPM</div>
      </div>
      <div class="result-card">
        <div class="value" id="resTime">0s</div>
        <div class="label">Time</div>
      </div>
    </div>
    <div class="result-detail">Correct characters: <span id="resCorrect">0</span></div>
    <div class="result-detail">Incorrect characters: <span id="resIncorrect">0</span></div>
    <div class="result-detail">Total characters: <span id="resTotal">0</span></div>
    <button class="restart-btn" id="restartBtn">Restart Test</button>
  </div>
</div>

<footer>
  <a href="/">Automated Insights</a> -- Free developer and productivity tools
</footer>

<script>
(function() {
  'use strict';

  const WORDS = [
    "the","of","and","to","in","is","you","that","it","he","was","for","on","are","as",
    "with","his","they","at","be","this","have","from","or","one","had","by","but","not",
    "what","all","were","we","when","your","can","said","there","use","an","each","which",
    "she","do","how","their","if","will","up","other","about","out","many","then","them",
    "these","so","some","her","would","make","like","him","into","time","has","look","two",
    "more","go","see","number","way","could","people","my","than","first","water","been",
    "call","who","oil","its","find","long","down","day","did","get","come","made","may",
    "part","over","new","sound","take","only","little","work","know","place","year","live",
    "me","back","give","most","very","after","thing","our","just","name","good","sentence",
    "man","think","say","great","where","help","through","much","before","line","right",
    "too","mean","old","any","same","tell","boy","follow","came","want","show","also",
    "around","form","three","small","set","put","end","does","another","well","large",
    "must","big","even","such","here","why","ask","went","men","read","need","land",
    "different","home","us","move","try","kind","hand","picture","again","change","off",
    "play","spell","air","away","animal","house","point","page","letter","mother","answer",
    "found","study","still","learn","should","world","high","every","near","add","food",
    "between","own","below","country","plant","last","school","father","keep","tree","never",
    "start","city","earth","eye","light","thought","head","under","story","saw","left",
    "few","while","along","might","close","something","seem","next","hard","open","example",
    "begin","life","always","those","both","paper","together","got","group","often","run",
    "important","until","children","side","feet","car","mile","night","walk","white","sea",
    "began","grow","took","river","four","carry","state","once","book","hear","stop",
    "without","second","late","miss","idea","enough","eat","face","watch","far","real",
    "almost","let","above","girl","sometimes","mountain","cut","young","talk","soon","list",
    "song","being","leave","family","body","music","color","stand","sun","question","fish",
    "area","mark","dog","horse","bird","problem","complete","room","knew","since","ever",
    "piece","told","usually","sure","become","top","ship","across","today","during","short",
    "better","best","however","low","hours","black","product","happened","whole","measure",
    "remember","early","reach","rest","nothing","able","power","system","program","report"
  ];

  let duration = 30;
  let timer = null;
  let startTime = null;
  let timeLeft = 30;
  let started = false;
  let finished = false;
  let wordList = [];
  let currentWordIndex = 0;
  let currentCharIndex = 0;
  let correctChars = 0;
  let incorrectChars = 0;
  let totalTyped = 0;
  let wordInputBuffer = '';

  const wordDisplay = document.getElementById('wordDisplay');
  const hiddenInput = document.getElementById('hiddenInput');
  const promptOverlay = document.getElementById('promptOverlay');
  const liveWpm = document.getElementById('liveWpm');
  const liveTime = document.getElementById('liveTime');
  const liveAccuracy = document.getElementById('liveAccuracy');
  const resultsEl = document.getElementById('results');
  const statsBar = document.getElementById('statsBar');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateWords(count) {
    let result = [];
    while (result.length < count) {
      result = result.concat(shuffle(WORDS));
    }
    return result.slice(0, count);
  }

  function init() {
    started = false;
    finished = false;
    currentWordIndex = 0;
    currentCharIndex = 0;
    correctChars = 0;
    incorrectChars = 0;
    totalTyped = 0;
    wordInputBuffer = '';
    timeLeft = duration;
    startTime = null;

    if (timer) {
      clearInterval(timer);
      timer = null;
    }

    wordList = generateWords(200);
    resultsEl.classList.remove('show');
    statsBar.style.display = '';
    wordDisplay.style.display = '';
    promptOverlay.classList.remove('hidden');

    liveWpm.textContent = '0';
    liveTime.textContent = duration;
    liveAccuracy.textContent = '100';

    renderWords();
    hiddenInput.value = '';
    hiddenInput.focus();
  }

  function renderWords() {
    // Keep the prompt overlay reference
    const overlayHTML = promptOverlay.outerHTML;

    let html = '';
    const visibleStart = Math.max(0, currentWordIndex - 2);
    // Render enough words ahead
    const visibleEnd = Math.min(wordList.length, currentWordIndex + 50);

    for (let wi = visibleStart; wi < visibleEnd; wi++) {
      const word = wordList[wi];
      let cls = 'word';

      if (wi < currentWordIndex) {
        // Already typed word
        cls += ' ' + (wordResults[wi] ? 'correct' : 'incorrect');
        html += '<span class="' + cls + '">';
        for (let ci = 0; ci < word.length; ci++) {
          html += '<span class="char">' + escapeHTML(word[ci]) + '</span>';
        }
        html += '</span>';
      } else if (wi === currentWordIndex) {
        // Current word being typed
        cls += ' current';
        html += '<span class="' + cls + '" data-word-index="' + wi + '">';
        for (let ci = 0; ci < word.length; ci++) {
          let charCls = 'char';
          if (ci < wordInputBuffer.length) {
            charCls += wordInputBuffer[ci] === word[ci] ? ' correct' : ' incorrect';
          }
          html += '<span class="' + charCls + '">' + escapeHTML(word[ci]) + '</span>';
        }
        // Extra typed characters beyond word length
        if (wordInputBuffer.length > word.length) {
          for (let ci = word.length; ci < wordInputBuffer.length; ci++) {
            html += '<span class="char extra">' + escapeHTML(wordInputBuffer[ci]) + '</span>';
          }
        }
        html += '</span>';
      } else {
        // Upcoming word
        cls += ' upcoming';
        html += '<span class="' + cls + '">';
        for (let ci = 0; ci < word.length; ci++) {
          html += '<span class="char">' + escapeHTML(word[ci]) + '</span>';
        }
        html += '</span>';
      }
    }

    wordDisplay.innerHTML = html + overlayHTML;

    // Re-grab overlay reference since we replaced innerHTML
    const newOverlay = wordDisplay.querySelector('.prompt-overlay');
    if (newOverlay && started) {
      newOverlay.classList.add('hidden');
    }

    scrollToCurrentWord();
  }

  let wordResults = {}; // index -> true/false

  function scrollToCurrentWord() {
    const currentEl = wordDisplay.querySelector('.word.current');
    if (!currentEl) { return; }

    const displayRect = wordDisplay.getBoundingClientRect();
    const wordRect = currentEl.getBoundingClientRect();
    const relativeTop = wordRect.top - displayRect.top;

    // If the current word is too far down, scroll
    if (relativeTop > 60) {
      wordDisplay.scrollTop += relativeTop - 28;
    }
  }

  function escapeHTML(str) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return str.replace(/[&<>"']/g, c => map[c]);
  }

  function startTest() {
    if (started) { return; }
    started = true;
    startTime = performance.now();

    wordDisplay.classList.add('typing');

    timer = setInterval(tick, 100);
  }

  function tick() {
    const elapsed = (performance.now() - startTime) / 1000;
    timeLeft = Math.max(0, duration - elapsed);
    liveTime.textContent = Math.ceil(timeLeft);

    // Calculate live WPM (net)
    const minutes = elapsed / 60;
    if (minutes > 0) {
      const grossWpm = (correctChars + incorrectChars) / 5 / minutes;
      const errorsPerMin = incorrectChars / 5 / minutes;
      const netWpm = Math.max(0, Math.round(grossWpm - errorsPerMin));
      liveWpm.textContent = netWpm;
    }

    // Live accuracy
    if (totalTyped > 0) {
      liveAccuracy.textContent = Math.round((correctChars / totalTyped) * 100);
    }

    if (timeLeft <= 0) {
      endTest();
    }
  }

  function endTest() {
    finished = true;
    clearInterval(timer);
    timer = null;
    wordDisplay.classList.remove('typing');

    const elapsed = duration;
    const minutes = elapsed / 60;
    const grossWpm = Math.round((correctChars + incorrectChars) / 5 / minutes);
    const errorsPerMin = incorrectChars / 5 / minutes;
    const netWpm = Math.max(0, Math.round(grossWpm - errorsPerMin));
    const accuracy = totalTyped > 0 ? Math.round((correctChars / totalTyped) * 100) : 100;

    document.getElementById('resWpm').textContent = netWpm;
    document.getElementById('resGrossWpm').textContent = grossWpm;
    document.getElementById('resAccuracy').textContent = accuracy + '%';
    document.getElementById('resTime').textContent = duration + 's';
    document.getElementById('resCorrect').textContent = correctChars;
    document.getElementById('resIncorrect').textContent = incorrectChars;
    document.getElementById('resTotal').textContent = totalTyped;

    statsBar.style.display = 'none';
    wordDisplay.style.display = 'none';
    resultsEl.classList.add('show');
  }

  // Handle input
  hiddenInput.addEventListener('input', function(e) {
    if (finished) { return; }
    if (!started) { startTest(); }

    const val = hiddenInput.value;

    // Space means submit current word
    if (val.endsWith(' ')) {
      submitWord();
      hiddenInput.value = '';
      wordInputBuffer = '';
    } else {
      wordInputBuffer = val;
    }

    renderWords();
  });

  hiddenInput.addEventListener('keydown', function(e) {
    if (finished) { return; }

    // Prevent tab from leaving
    if (e.key === 'Tab') {
      e.preventDefault();
    }
  });

  function submitWord() {
    const word = wordList[currentWordIndex];
    const typed = wordInputBuffer.trim();

    let wordCorrectChars = 0;
    let wordIncorrectChars = 0;
    const maxLen = Math.max(word.length, typed.length);

    for (let i = 0; i < maxLen; i++) {
      if (i < typed.length && i < word.length && typed[i] === word[i]) {
        wordCorrectChars++;
      } else if (i < typed.length) {
        wordIncorrectChars++;
      } else {
        // Characters in word not typed count as incorrect
        wordIncorrectChars++;
      }
    }

    // Count the space as a correct character (word separator)
    wordCorrectChars++;
    totalTyped += maxLen + 1;

    correctChars += wordCorrectChars;
    incorrectChars += wordIncorrectChars;
    wordResults[currentWordIndex] = (typed === word);
    currentWordIndex++;
    currentCharIndex = 0;

    // Generate more words if running low
    if (currentWordIndex + 50 >= wordList.length) {
      wordList = wordList.concat(generateWords(100));
    }
  }

  // Click to focus
  wordDisplay.addEventListener('click', function() {
    hiddenInput.focus();
  });

  // Keep focus
  document.addEventListener('keydown', function(e) {
    if (finished) { return; }
    if (e.key.length === 1 || e.key === 'Backspace') {
      hiddenInput.focus();
    }
  });

  // Timer buttons
  document.getElementById('timerBar').addEventListener('click', function(e) {
    const btn = e.target.closest('.timer-btn');
    if (!btn || started) { return; }

    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    duration = parseInt(btn.dataset.time, 10);
    init();
  });

  // Restart
  document.getElementById('restartBtn').addEventListener('click', function() {
    init();
  });

  // Keyboard shortcut to restart
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      init();
    }
  });

  // Initialize
  init();
})();
</script>

</body>
</html>
