<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Word Counter</title>
    <meta name="description" content="{{answer}}">
    <link rel="canonical" href="https://automated-insights.com/word-counter/{{slug}}/">
    <meta property="og:title" content="{{title}} - Word Counter">
    <meta property="og:description" content="{{answer}}">
    <meta property="og:url" content="https://automated-insights.com/word-counter/{{slug}}/">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Automated Insights">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3434609691579834" crossorigin="anonymous"></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [{
            "@type": "Question",
            "name": "{{question}}",
            "acceptedAnswer": {
                "@type": "Answer",
                "text": "{{answer}}"
            }
        }]
    }
    </script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f1117;
            color: #e8eaed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 740px;
            margin: 0 auto;
            padding: 32px 16px 48px;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: #9aa0b0;
            margin-bottom: 24px;
        }

        .breadcrumb a {
            color: #6c63ff;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .answer-card {
            background: #1a1d27;
            border: 1px solid #2e3345;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 28px;
            border-left: 3px solid #6c63ff;
        }

        .answer-card p {
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .details {
            margin-bottom: 32px;
        }

        .details h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .details p {
            color: #9aa0b0;
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .conversion-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #1a1d27;
            border-radius: 8px;
            overflow: hidden;
        }

        .conversion-table th,
        .conversion-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2e3345;
        }

        .conversion-table th {
            background: #1a1d27;
            color: #9aa0b0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .conversion-table td {
            font-size: 0.95rem;
        }

        .conversion-table tr:last-child td {
            border-bottom: none;
        }

        .conversion-table tr.highlight {
            background: rgba(108, 99, 255, 0.08);
        }

        .cta-box {
            background: #1a1d27;
            border: 1px solid #2e3345;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-top: 32px;
        }

        .cta-box p {
            color: #9aa0b0;
            margin-bottom: 12px;
        }

        .cta-box a {
            display: inline-block;
            background: #6c63ff;
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .cta-box a:hover {
            background: #5b53e0;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #2e3345;
            color: #9aa0b0;
            font-size: 0.8rem;
        }

        footer a {
            color: #6c63ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.35rem;
            }

            .conversion-table th,
            .conversion-table td {
                padding: 10px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="breadcrumb">
            <a href="https://automated-insights.com/">Home</a> /
            <a href="https://automated-insights.com/word-counter/">Word Counter</a> /
            {{title}}
        </nav>

        <h1>{{title}}</h1>

        <div class="answer-card">
            <p>{{answer}}</p>
        </div>

        {{details_section}}

        <div class="cta-box">
            <p>Need to count the words in your own text?</p>
            <a href="https://automated-insights.com/word-counter/">Open Word Counter Tool</a>
        </div>

        <footer>
            <p>&copy; 2026 <a href="https://automated-insights.com/">Automated Insights</a></p>
        </footer>
    </div>
</body>
</html>
