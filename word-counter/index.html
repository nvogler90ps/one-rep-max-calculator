<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - Free Online Word &amp; Character Count Tool</title>
    <meta name="description" content="Free online word counter and character count tool. Instantly count words, characters, sentences, paragraphs, reading time, and keyword density.">
    <link rel="canonical" href="https://automated-insights.com/word-counter/">
    <meta property="og:title" content="Word Counter - Free Online Word &amp; Character Count Tool">
    <meta property="og:description" content="Free online word counter and character count tool. Instantly count words, characters, sentences, paragraphs, reading time, and keyword density.">
    <meta property="og:url" content="https://automated-insights.com/word-counter/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Automated Insights">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Word Counter - Free Online Word &amp; Character Count Tool">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f1117;
            color: #e8eaed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #e8eaed;
        }

        .subtitle {
            color: #9aa0b0;
            font-size: 0.95rem;
        }

        .editor-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            min-height: 240px;
            background: #1a1d27;
            border: 1px solid #2e3345;
            border-radius: 8px;
            color: #e8eaed;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.7;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #6c63ff;
        }

        textarea::placeholder {
            color: #9aa0b0;
        }

        .btn-clear {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #2e3345;
            border: none;
            color: #9aa0b0;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-clear:hover {
            background: #6c63ff;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1d27;
            border: 1px solid #2e3345;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #6c63ff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #9aa0b0;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .keyword-section {
            background: #1a1d27;
            border: 1px solid #2e3345;
            border-radius: 8px;
            padding: 20px;
        }

        .keyword-section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e8eaed;
        }

        .keyword-empty {
            color: #9aa0b0;
            font-size: 0.9rem;
        }

        .keyword-list {
            list-style: none;
        }

        .keyword-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2e3345;
        }

        .keyword-item:last-child {
            border-bottom: none;
        }

        .keyword-word {
            font-weight: 500;
        }

        .keyword-bar-wrap {
            flex: 1;
            margin: 0 16px;
            background: #2e3345;
            border-radius: 3px;
            height: 6px;
            overflow: hidden;
        }

        .keyword-bar {
            height: 100%;
            background: #6c63ff;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .keyword-count {
            color: #9aa0b0;
            font-size: 0.85rem;
            min-width: 60px;
            text-align: right;
        }

        footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #2e3345;
            color: #9aa0b0;
            font-size: 0.8rem;
        }

        footer a {
            color: #6c63ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.35rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            textarea {
                min-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Word Counter</h1>
            <p class="subtitle">Paste or type your text below to get instant word count, character count, and more.</p>
        </header>

        <div class="editor-wrap">
            <textarea id="textInput" placeholder="Start typing or paste your text here..."></textarea>
            <button class="btn-clear" id="btnClear" type="button">Clear</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">Characters</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="charNoSpaceCount">0</div>
                <div class="stat-label">Chars (no spaces)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sentenceCount">0</div>
                <div class="stat-label">Sentences</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="paragraphCount">0</div>
                <div class="stat-label">Paragraphs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgWordLen">0</div>
                <div class="stat-label">Avg Word Length</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="readingTime">0s</div>
                <div class="stat-label">Reading Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="speakingTime">0s</div>
                <div class="stat-label">Speaking Time</div>
            </div>
        </div>

        <div class="keyword-section">
            <h2>Keyword Density</h2>
            <div id="keywordContent">
                <p class="keyword-empty">Start typing to see keyword density.</p>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 <a href="https://automated-insights.com/">Automated Insights</a></p>
        </footer>
    </div>

    <script>
        (function () {
            var textInput = document.getElementById("textInput");
            var btnClear = document.getElementById("btnClear");

            var STOP_WORDS = new Set([
                "a","about","above","after","again","against","all","am","an","and","any","are",
                "aren't","as","at","be","because","been","before","being","below","between","both",
                "but","by","can","can't","cannot","could","couldn't","did","didn't","do","does",
                "doesn't","doing","don't","down","during","each","few","for","from","further","get",
                "got","had","hadn't","has","hasn't","have","haven't","having","he","he'd","he'll",
                "he's","her","here","here's","hers","herself","him","himself","his","how","how's",
                "i","i'd","i'll","i'm","i've","if","in","into","is","isn't","it","it's","its",
                "itself","just","let's","me","more","most","mustn't","my","myself","no","nor","not",
                "of","off","on","once","only","or","other","ought","our","ours","ourselves","out",
                "over","own","same","shan't","she","she'd","she'll","she's","should","shouldn't",
                "so","some","such","than","that","that's","the","their","theirs","them","themselves",
                "then","there","there's","these","they","they'd","they'll","they're","they've",
                "this","those","through","to","too","under","until","up","very","was","wasn't","we",
                "we'd","we'll","we're","we've","were","weren't","what","what's","when","when's",
                "where","where's","which","while","who","who's","whom","why","why's","will","with",
                "won't","would","wouldn't","you","you'd","you'll","you're","you've","your","yours",
                "yourself","yourselves","also","been","being","did","does","done","going","gone",
                "got","gotten","has","have","having","here","just","like","made","make","many",
                "much","must","need","new","now","old","one","only","own","said","say","says",
                "shall","since","still","take","tell","thing","think","two","us","use","used",
                "using","want","way","well","went","were","will","back","even","good","great",
                "know","long","look","may","might","really","right","see","something","time",
                "come","day","first","give","go","keep","last","let","little","man","never",
                "next","part","place","point","put","seem","show","side","small","sure","turn",
                "work","world","year","yes","yet"
            ]);

            function getWords(text) {
                var trimmed = text.trim();
                if (trimmed === "") {
                    return [];
                }
                return trimmed.split(/\s+/);
            }

            function formatTime(minutes) {
                if (minutes < 1) {
                    var secs = Math.round(minutes * 60);
                    return secs + "s";
                }
                var m = Math.floor(minutes);
                var s = Math.round((minutes - m) * 60);
                if (s === 60) {
                    m++;
                    s = 0;
                }
                if (s === 0) {
                    return m + "m";
                }
                return m + "m " + s + "s";
            }

            function update() {
                var text = textInput.value;
                var words = getWords(text);
                var wordCount = words.length;

                var charCount = text.length;
                var charNoSpace = text.replace(/\s/g, "").length;

                var sentences = 0;
                if (text.trim().length > 0) {
                    var sentenceMatches = text.match(/[^.!?]*[.!?]+/g);
                    sentences = sentenceMatches ? sentenceMatches.length : 0;
                    if (sentences === 0 && text.trim().length > 0) {
                        sentences = 1;
                    }
                }

                var paragraphs = 0;
                if (text.trim().length > 0) {
                    var paras = text.split(/\n\s*\n/);
                    paragraphs = 0;
                    for (var i = 0; i < paras.length; i++) {
                        if (paras[i].trim().length > 0) {
                            paragraphs++;
                        }
                    }
                    if (paragraphs === 0 && text.trim().length > 0) {
                        paragraphs = 1;
                    }
                }

                var avgLen = 0;
                if (wordCount > 0) {
                    var totalLen = 0;
                    for (var i = 0; i < words.length; i++) {
                        totalLen += words[i].replace(/[^a-zA-Z0-9]/g, "").length;
                    }
                    avgLen = (totalLen / wordCount).toFixed(1);
                }

                var readingMin = wordCount / 238;
                var speakingMin = wordCount / 150;

                document.getElementById("wordCount").textContent = wordCount.toLocaleString();
                document.getElementById("charCount").textContent = charCount.toLocaleString();
                document.getElementById("charNoSpaceCount").textContent = charNoSpace.toLocaleString();
                document.getElementById("sentenceCount").textContent = sentences.toLocaleString();
                document.getElementById("paragraphCount").textContent = paragraphs.toLocaleString();
                document.getElementById("avgWordLen").textContent = avgLen;
                document.getElementById("readingTime").textContent = formatTime(readingMin);
                document.getElementById("speakingTime").textContent = formatTime(speakingMin);

                updateKeywords(words, wordCount);
            }

            function updateKeywords(words, totalWords) {
                var container = document.getElementById("keywordContent");

                if (totalWords === 0) {
                    container.innerHTML = '<p class="keyword-empty">Start typing to see keyword density.</p>';
                    return;
                }

                var freq = {};
                for (var i = 0; i < words.length; i++) {
                    var w = words[i].toLowerCase().replace(/[^a-z0-9'-]/g, "");
                    if (w.length < 2 || STOP_WORDS.has(w)) {
                        continue;
                    }
                    freq[w] = (freq[w] || 0) + 1;
                }

                var entries = [];
                for (var key in freq) {
                    if (freq.hasOwnProperty(key)) {
                        entries.push({ word: key, count: freq[key] });
                    }
                }

                entries.sort(function (a, b) { return b.count - a.count; });
                entries = entries.slice(0, 10);

                if (entries.length === 0) {
                    container.innerHTML = '<p class="keyword-empty">No significant keywords found.</p>';
                    return;
                }

                var maxCount = entries[0].count;
                var html = '<ul class="keyword-list">';
                for (var i = 0; i < entries.length; i++) {
                    var pct = ((entries[i].count / totalWords) * 100).toFixed(1);
                    var barWidth = ((entries[i].count / maxCount) * 100).toFixed(0);
                    html += '<li class="keyword-item">' +
                        '<span class="keyword-word">' + escapeHtml(entries[i].word) + '</span>' +
                        '<div class="keyword-bar-wrap"><div class="keyword-bar" style="width:' + barWidth + '%"></div></div>' +
                        '<span class="keyword-count">' + entries[i].count + 'x (' + pct + '%)</span>' +
                        '</li>';
                }
                html += '</ul>';
                container.innerHTML = html;
            }

            function escapeHtml(str) {
                var div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            textInput.addEventListener("input", update);

            btnClear.addEventListener("click", function () {
                textInput.value = "";
                update();
                textInput.focus();
            });
        })();
    </script>
</body>
</html>
