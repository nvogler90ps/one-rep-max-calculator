<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- "A" - bold geometric -->
  <path d="M120 400 L230 112 L340 400" stroke="#fff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="158" y1="310" x2="302" y2="310" stroke="#fff" stroke-width="36" stroke-linecap="round"/>
  <!-- "I" - clean vertical -->
  <line x1="410" y1="190" x2="410" y2="400" stroke="#fff" stroke-width="40" stroke-linecap="round"/>
  <!-- Insight spark dot on the "I" - golden accent -->
  <circle cx="410" cy="128" r="32" fill="url(#spark)"/>
  <!-- Small sparkle rays around the dot -->
  <line x1="410" y1="80" x2="410" y2="68" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="448" y1="100" x2="456" y2="92" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="458" y1="128" x2="470" y2="128" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="448" y1="156" x2="456" y2="164" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
